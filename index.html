<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Webpage</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #333;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: block;
        }
        nav a:hover {
            background-color: #575757;
        }
        main {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }
        section {
            margin-bottom: 40px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px 0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        input, textarea {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Webpage</h1>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</nav>

<main>
    <section id="home">
        <h2>Home Section</h2>
        <p>This is the home section of your website. You can add more content here, images, or videos.</p>
        <button onclick="alert('Button clicked!')">Click Me</button>
    </section>

    <section id="about">
        <h2>About Section</h2>
        <p>Write something about yourself or your project here.</p>
    </section>

    <section id="contact">
        <h2>Contact Section</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Your Name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Your Email" required>
            
            <label for="message">Message:</label>
            <textarea id="message" placeholder="Your Message" rows="5" required></textarea>
            
            <button type="submit">Send Message</button>
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 My Webpage. All rights reserved.</p>
</footer>

</body>
</html>
